# -----------------------------------------------------------------------------
# 🦘 Sandy Yellow Theme Mako Global Style Settings
# -----------------------------------------------------------------------------
font=Sans 11
# Bright sand background with transparency
background-color=#f8f1eddd   
# Deep high-visibility text
text-color=#264653           
width=360
height=150
margin=15,25,25,15
padding=16
border-size=2
# Sunshine yellow border
border-color=#e9c46a         
border-radius=16
# Warm sandy orange progress bar
progress-color=over #f4a261   

# Layout & Behavior
# Bold sandy orange header text
format=<b><span foreground='#f4a261'>%s</span></b>\n%b  
text-alignment=left
default-timeout=6000
layer=top
anchor=top-right

# Urgency Overrides
[urgency=low]
# Muted border
border-color=#e2d4c9          
# Muted text color
text-color=#6d6875            
default-timeout=4000

[urgency=critical]
# Sunburnt red warning border
border-color=#e76f51          
# High contrast white text
text-color=#ffffff            
default-timeout=0
