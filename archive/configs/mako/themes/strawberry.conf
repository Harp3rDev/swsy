# -----------------------------------------------------------------------------
# 🌸 Cute Strawberry Pink Global Style Settings
# -----------------------------------------------------------------------------
font=Sans 11
background-color=#875366dd   
text-color=#ffffff           
width=360
height=150
margin=15,25,25,15
padding=16
border-size=2
border-color=#d48da3         
border-radius=16
progress-color=over #a66275  

# Icons configuration
icons=1
max-icon-size=48
icon-location=left
icon-border-radius=8

# Layout & Behavior
format=<b><span foreground='#e9b3c2'>%s</span></b>\n%b
text-alignment=left
default-timeout=6000
ignore-timeout=0
layer=top
anchor=top-right

# -----------------------------------------------------------------------------
# Urgency Overrides
# -----------------------------------------------------------------------------

# Low Urgency (e.g., subtle status changes, music tracks)
[urgency=low]
border-color=#633948
text-color=#cca3af
default-timeout=4000

# High / Critical Urgency (e.g., low battery, system errors)
[urgency=critical]
border-color=#7a4848
text-color=#fdebf0 
default-timeout=0
