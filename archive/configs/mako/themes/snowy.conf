# -----------------------------------------------------------------------------
# 🌊 SnowyEgret Signature Mako Global Style Settings
# -----------------------------------------------------------------------------
font=Sans 11
background-color=#5B507Add
text-color=#BFD7EA
width=360
height=150
margin=15,25,25,15
padding=16
border-size=2
border-color=#B9E28C
border-radius=16
progress-color=over #D6D84F

# Layout & Behavior
format=<b><span foreground='#B9E28C'>%s</span></b>\n%b
text-alignment=left
default-timeout=6000
layer=top
anchor=top-right

# Urgency Overrides
[urgency=low]
border-color=#5B618A          
text-color=#9EADC8            
default-timeout=4000

[urgency=critical]
border-color=#0A8754
text-color=#BFD7EA            
default-timeout=0
