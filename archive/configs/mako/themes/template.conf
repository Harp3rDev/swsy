# -----------------------------------------------------------------------------
# 🌊 [Theme Name] Mako Global Style Settings
# -----------------------------------------------------------------------------
font=Sans 11
background-color=#BASE_BGdd   # Add 'dd' or 'cc' at the end for alpha transparency!
text-color=#TEXT_LIGHT        # Primary notification message text
width=360
height=150
margin=15,25,25,15
padding=16
border-size=2
border-color=#MAIN_ACCENT     # Global notification window border
border-radius=16
progress-color=over #INDICATOR # Progress bar accent color (e.g., download bars)

# Layout & Behavior
format=<b><span foreground='#TEXT_ALT'>%s</span></b>\n%b  # Bold summary header text color
text-alignment=left
default-timeout=6000
layer=top
anchor=top-right

# Urgency Overrides
[urgency=low]
border-color=#BLOCK_BG_2      # Muted/subtle border for low priority alerts
text-color=#TEXT_MUTED        # Dimmed secondary text color
default-timeout=4000

[urgency=critical]
border-color=#URGENT_COLOR    # Highly visible border for errors/low battery
text-color=#TEXT_LIGHT        # High contrast emergency text
default-timeout=0
