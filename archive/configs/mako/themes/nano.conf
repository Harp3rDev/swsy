# -----------------------------------------------------------------------------
# 🩵 Summer Nano Theme Mako Global Style Settings - Max-Grey Edition
# -----------------------------------------------------------------------------
font=Sans 11
# CHANGED: Semi-transparent dark matte-charcoal background
background-color=#1e293bdd   
# Light silver-white text for the notification body
text-color=#f1f5f9           
width=360
height=150
margin=15,25,25,15
padding=16
border-size=2

# METALLIC BORDERS & PROGRESS
# Polished silver-grey border frame
border-color=#94a3b8         
border-radius=16
# Bright shining silver for progress lines
progress-color=over #cbd5e1   

# Layout & Behavior
# Bold shining silver header text (swapped out the blue!)
format=<b><span foreground='#cbd5e1'>%s</span></b>\n%b  
text-alignment=left
default-timeout=6000
layer=top
anchor=top-right

# Urgency Overrides
[urgency=low]
border-color=#334155          
text-color=#94a3b8            
default-timeout=4000

[urgency=critical]
# Red warning border for emergencies!
border-color=#dc2626          
text-color=#ffffff            
default-timeout=0
