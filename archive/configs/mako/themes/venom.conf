# -----------------------------------------------------------------------------
# 🐈‍⬛ Venom Theme Mako Global Style Settings
# -----------------------------------------------------------------------------
font=Sans 11
# Deep black with alpha transparency
background-color=#0d0d0ddd   
# Primary notification text
text-color=#ffffff           
width=360
height=150
margin=15,25,25,15
padding=16
border-size=2
# Darker green border
border-color=#1db954         
border-radius=16
# Matching progress bar
progress-color=over #1aa34a   

# Layout & Behavior
# Readable green header text
format=<b><span foreground='#2ed164'>%s</span></b>\n%b  
text-alignment=left
default-timeout=6000
layer=top
anchor=top-right

# Urgency Overrides
[urgency=low]
# Muted border
border-color=#222222          
# Dimmed secondary text color
text-color=#757575            
default-timeout=4000

[urgency=critical]
# Sharp scratch-red border
border-color=#ff3333          
# High contrast white text
text-color=#ffffff            
default-timeout=0
